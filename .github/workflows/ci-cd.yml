name: Build, Push and Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, docker-local]

    permissions:
      contents: read
      packages: write

    steps:
      # Checkout source code
      - name: Checkout source
        uses: actions/checkout@v4

      # Login ke GitHub Container Registry
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # BACKEND
      - name: Build Backend Image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/aegira-loan-service:latest \
            -t ghcr.io/${{ github.repository_owner }}/aegira-loan-service:${{ github.sha }} \
            ./aegira-loan-service

      - name: Push Backend Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/aegira-loan-service:latest
          docker push ghcr.io/${{ github.repository_owner }}/aegira-loan-service:${{ github.sha }}

      # FRONTEND
      - name: Build Frontend Image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/creditappdemo:latest \
            -t ghcr.io/${{ github.repository_owner }}/creditappdemo:${{ github.sha }} \
            ./creditappdemo

      - name: Push Frontend Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/creditappdemo:latest
          docker push ghcr.io/${{ github.repository_owner }}/creditappdemo:${{ github.sha }}

      # DEPLOY
      - name: Pull Latest Images
        run: docker compose pull

      - name: Deploy Containers
        run: docker compose up -d --remove-orphans

      - name: Show Running Containers
        run: docker compose ps

      - name: Show Logs if Failed
        if: failure()
        run: docker compose logs