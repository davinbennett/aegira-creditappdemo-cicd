name: Build and Deploy                     # Nama workflow.

on:                                        # Trigger workflow.
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy                 # Hanya satu deployment berjalan dalam satu waktu.
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy with Self-Hosted Docker Runner
    runs-on: [self-hosted, docker-local]

    permissions:
      contents: read
      packages: read                       # Dibutuhkan untuk pull image dari GHCR.

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify Docker
        run: |
          docker --version
          docker compose version

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull latest images
        run: docker compose pull

      - name: Deploy containers
        run: docker compose up -d --remove-orphans

      - name: Show running containers
        run: docker compose ps

      - name: Show logs if deployment fails
        if: failure()
        run: docker compose logs