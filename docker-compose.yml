name: aegira-creditappdemo                   # Nama project Docker Compose.

services:                                    # Daftar service yang akan dijalankan.

  postgres:                                  # Service PostgreSQL.
    image: postgres:14-alpine                # Menggunakan image PostgreSQL 14 berbasis Alpine.
    environment:                             # Environment variable PostgreSQL.
      POSTGRES_DB: aegira_loan               # Nama database yang dibuat saat pertama kali container dijalankan.
      POSTGRES_USER: aegira                  # Username database.
      POSTGRES_PASSWORD: aegira_password     # Password database.
    ports:
      - "5432:5432"                          # Membuka port PostgreSQL ke host.
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Menyimpan data database secara persisten.
    healthcheck:                             # Mengecek apakah PostgreSQL sudah siap menerima koneksi.
      test: ["CMD-SHELL", "pg_isready -U aegira -d aegira_loan"]  # Perintah pengecekan database.
      interval: 10s                          # Health check dijalankan setiap 10 detik.
      timeout: 5s                            # Maksimal waktu tunggu setiap health check.
      retries: 5                             # Maksimal 5 kali percobaan sebelum dianggap gagal.

  redis:                                     # Service Redis.
    image: redis:5.0.3-alpine                # Menggunakan image Redis berbasis Alpine.
    container_name: aegira-loan-redis        # Nama container Redis.
    command: redis-server --appendonly yes   # Menjalankan Redis dengan fitur Append Only File (AOF).
    ports:
      - "6379:6379"                          # Membuka port Redis ke host.
    volumes:
      - redis_data:/data                     # Menyimpan data Redis secara persisten.

  aegira-loan-service:                       # Service backend Spring Boot.
    image: ghcr.io/davinbennett/aegira-loan-service:latest         # Nama image hasil build.
    depends_on:                              # Menentukan dependency service.
      postgres:
        condition: service_healthy           # Menunggu PostgreSQL sehat sebelum backend dijalankan.
      redis:
        condition: service_started           # Menunggu Redis berjalan.
    environment:                             # Environment variable backend.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aegira_loan  # URL koneksi PostgreSQL.
      SPRING_DATASOURCE_USERNAME: aegira     # Username database.
      SPRING_DATASOURCE_PASSWORD: aegira_password  # Password database.
      REDIS_HOST: redis                      # Host Redis pada jaringan Docker.
      REDIS_PORT: 6379                       # Port Redis.
      JWT_SECRET: change-this-secret         # Secret key JWT.
      JWT_EXPIRATION: 3600000                # Waktu kedaluwarsa JWT (ms).
      LOAN_DATA_SOURCE_MODE: DATABASE        # Mode sumber data aplikasi.
      IDEMPOTENCY_ENABLED: true              # Mengaktifkan fitur idempotency.
      IDEMPOTENCY_TTL_SECONDS: 86400         # Durasi penyimpanan idempotency (detik).
    ports:
      - "8080:8080"                          # Membuka port backend ke host.

  creditappdemo:                             # Service frontend.
    ports:
      - "5173:80"
    image: ghcr.io/davinbennett/creditappdemo:latest             # Nama image frontend.

volumes:                                     # Daftar Docker Volume.
  postgres_data:                             # Volume untuk menyimpan data PostgreSQL.
  redis_data:                                # Volume untuk menyimpan data Redis.